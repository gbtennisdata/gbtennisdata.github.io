<title>GB Tennis Data</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f5f5;
    }

    /* Sticky Header */
    #header-banner {
        position: sticky;
        top: 0;
        z-index: 9999;
        background: #3a7;
        color: #fff;
        padding: 20px;
        text-align: center;
        font-size: 32px;
        font-weight: bold;
        border-bottom: 3px solid #2a5;
    }

    /* Page Sections */
    .section {
        margin: 40px auto;
        max-width: 900px;
        padding: 20px;
    }

    .section h2 {
        font-size: 26px;
        margin-bottom: 20px;
        color: #333;
        text-align: center;
    }

    /* Link Boxes */
    .link-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
    }

    .link-box {
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #3a7;
        color: #3a7;
        text-decoration: none;
        transition: 0.2s;
    }

    .link-box:hover {
        background: #3a7;
        color: #fff;
        cursor: pointer;
    }
</style>
</head>
